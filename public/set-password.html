<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Set your password — Cedabond Exhibition</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="wrap narrow">
    <div class="card">
      <h1>Set your password</h1>
      <p class="muted">Choose a password to access your exhibition portal.</p>
      <form id="setForm">
        <label for="password">New password</label>
        <input type="password" id="password" required minlength="8" autocomplete="new-password">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" required minlength="8" autocomplete="new-password">
        <div class="error" id="err"></div>
        <button type="submit" class="primary" style="width:100%">Set password &amp; continue</button>
      </form>
    </div>
  </div>
  <script src="/js/common.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const type = params.get('type');

    document.getElementById('setForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('err');
      errEl.textContent = '';
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      if (password !== confirm) { errEl.textContent = 'Passwords do not match'; return; }
      if (!token || !type) { errEl.textContent = 'This link is missing information. Please use the link from your email exactly as sent.'; return; }

      try {
        await api('POST', '/api/auth/set-password', { token, type, password });
        showToast('Password set — you can now sign in.');
        setTimeout(() => window.location.href = '/login.html', 1200);
      } catch (err) {
        errEl.textContent = err.message;
      }
    });
  </script>
</body>
</html>
