<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Supplier Portal — Cedabond Exhibition</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="topbar">
    <div class="brand">Cedabond Exhibition<small>Supplier portal</small></div>
    <div>
      <span class="muted" id="whoami" style="margin-right:14px"></span>
      <button class="secondary small" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="wrap">
    <div class="grid-2">
      <div class="card">
        <h2>Members</h2>
        <p class="muted">Request a meeting with any attending member. They'll be notified and can book one of your open slots.</p>
        <table id="membersTable">
          <thead><tr>
            <th class="sortable" data-sort="surname">Name</th>
            <th class="sortable" data-sort="date">Date</th>
            <th>Time</th>
            <th class="sortable" data-sort="bookings">Status</th>
          </tr></thead>
          <tbody></tbody>
        </table>
        <p class="empty" id="membersEmpty" style="display:none">No members loaded yet.</p>
      </div>

      <div class="card">
        <h2>My schedule</h2>
        <p class="muted">Tap an open slot to block it (e.g. for a break). Tap a blocked slot to release it again.</p>
        <div id="schedule"></div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/supplier.js"></script>
</body>
</html>
